# 推送 v* 标签时，在 Windows / macOS / Linux 上分别构建并发布到 GitHub Releases。
#
# 首次使用前请在 GitHub 仓库 Settings → Secrets and variables → Actions 中配置：
#   TAURI_SIGNING_PRIVATE_KEY          — tauri signer generate 生成的私钥内容
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — 生成密钥时设置的密码（无密码可留空或不建）
#
# 发版：git tag v1.0.1 && git push origin v1.0.1

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: WorkHub v__VERSION__
          releaseBody: |
            见下方 Assets 下载对应平台的安装包。
            - Windows: `WorkHub_*_x64-setup.exe`
            - macOS: `WorkHub_*_aarch64.dmg`
            - Linux: `WorkHub_*_amd64.deb` / `WorkHub_*_amd64.AppImage`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
