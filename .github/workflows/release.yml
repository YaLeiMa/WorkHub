# 发版：workflow 先 push 到 main，再打新标签
#   git tag v1.0.1 && git push origin v1.0.1
#
# 三端并行构建，但 Release 只上传一次，避免 GitHub API secondary rate limit。

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag（手动触发时填写，如 v1.0.1）"
        required: false

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact: bundle-windows
            args: ""
          - platform: macos-latest
            artifact: bundle-macos
            args: ""
          - platform: ubuntu-22.04
            artifact: bundle-linux
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf

      - name: Install frontend dependencies
        run: |
          npm ci
          npx tauri --version

      - name: Build Tauri app (Windows, fast CI profile)
        if: matrix.platform == 'windows-latest'
        run: npx tauri build
        env:
          CI: true
          CARGO_PROFILE_RELEASE_LTO: "false"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build Tauri app
        if: matrix.platform != 'windows-latest'
        run: npx tauri build ${{ matrix.args }}
        env:
          CI: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Locate bundle output
        id: bundle
        shell: bash
        run: |
          BUNDLE=$(find src-tauri/target -path '*/release/bundle' -type d 2>/dev/null | head -1)
          if [ -z "$BUNDLE" ]; then
            echo "Bundle directory not found. Contents of src-tauri/target:"
            find src-tauri/target -maxdepth 4 -type d 2>/dev/null || true
            exit 1
          fi
          echo "Found bundle at: $BUNDLE"
          echo "path=$BUNDLE" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ steps.bundle.outputs.path }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all platform bundles
        uses: actions/download-artifact@v4
        with:
          path: bundles
          merge-multiple: true

      - name: Resolve release tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if [[ ! "$TAG" =~ ^v[0-9] ]]; then
            echo "::error::Invalid release tag: $TAG (expected v1.0.0 format)"
            exit 1
          fi
          echo "Using tag: $TAG"
          echo "name=$TAG" >> "$GITHUB_OUTPUT"

      - name: List bundle files
        run: find bundles -type f -print

      - name: Verify updater artifacts (all platforms)
        run: |
          echo "=== .sig files ==="
          find bundles -name '*.sig' | sort || true
          echo "=== macOS (need WorkHub.app.tar.gz + .sig for latest.json) ==="
          find bundles \( -name '*.dmg' -o -name '*.app.tar.gz' \) | sort || true
          missing=0
          for pattern in '*-setup.exe.sig' '*.app.tar.gz.sig' '*.AppImage.sig'; do
            if ! find bundles -name "$pattern" | grep -q .; then
              echo "::warning::Missing updater pattern: $pattern"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::warning::$missing platform(s) missing updater .sig — latest.json will be incomplete. Check macOS build job logs."
          fi

      - name: Generate latest.json
        run: |
          node scripts/generate-latest-json.mjs \
            --bundles bundles \
            --tag "${{ steps.tag.outputs.name }}" \
            --repo "${{ github.repository }}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.name }}"

          mapfile -t FILES < <(find bundles -type f \( \
            -iname '*.exe' -o \
            -iname '*.dmg' -o \
            -iname '*.deb' -o \
            -iname '*.AppImage' -o \
            -iname '*.sig' -o \
            -iname '*.tar.gz' -o \
            -name 'latest.json' \
          \) | sort -u)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No installer files found (.exe/.dmg/.deb/.AppImage)"
            exit 1
          fi

          echo "Uploading ${#FILES[@]} file(s) to release $TAG"
          printf '  - %s\n' "${FILES[@]}"

          # 删除已有 Release（保留 git tag），避免 --clobber 删除单个 asset 时 404
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Removing existing release $TAG (keeping tag)"
            gh release delete "$TAG" --yes --cleanup-tag=false
          fi

          gh release create "$TAG" "${FILES[@]}" \
            --draft \
            --title "WorkHub $TAG" \
            --generate-notes
          # Draft 状态下 /releases/latest 不可用；确认 assets 含 latest.json 后请 Publish release
