# 仅发布：复用某次已成功 build 的 artifacts，无需重新编译（约 1 分钟）
#
# 用法：
# 1. 打开 Actions 里 build 已全部成功的 run
# 2. URL 末尾数字即 run_id，例如 .../actions/runs/12345678901
# 3. Actions → Publish Release → Run workflow
#    - run_id: 12345678901
#    - tag: v1.0.1

name: Publish Release

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "已成功 build 的 Run ID（Actions URL 末尾数字）"
        required: true
      tag:
        description: "Release tag，如 v1.0.1"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      # checkout main（不是 tag），供 gh --generate-notes 使用；tag 不存在时也能跑
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts from previous run
        uses: actions/download-artifact@v4
        with:
          path: bundles
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.run_id }}

      - name: Validate tag
        id: tag
        run: |
          TAG="${{ inputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9] ]]; then
            echo "::error::Invalid tag: $TAG"
            exit 1
          fi
          echo "name=$TAG" >> "$GITHUB_OUTPUT"

      - name: List bundle files
        run: |
          find bundles -type f -print
          COUNT=$(find bundles -type f | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No files downloaded. Check run_id has bundle-windows/macos/linux artifacts."
            exit 1
          fi

      - name: Generate latest.json
        run: |
          node scripts/generate-latest-json.mjs \
            --bundles bundles \
            --tag "${{ steps.tag.outputs.name }}" \
            --repo "${{ github.repository }}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.name }}"

          # 只上传安装包与更新相关文件，不上传 bundle 内数百个中间文件
          mapfile -t FILES < <(find bundles -type f \( \
            -iname '*.exe' -o \
            -iname '*.dmg' -o \
            -iname '*.deb' -o \
            -iname '*.AppImage' -o \
            -iname '*.sig' -o \
            -iname '*.tar.gz' -o \
            -name 'latest.json' \
          \) | sort -u)

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No installer files found (.exe/.dmg/.deb/.AppImage)"
            find bundles -type f | head -20
            exit 1
          fi

          echo "Uploading ${#FILES[@]} file(s) to release $TAG"
          printf '  - %s\n' "${FILES[@]}"

          git fetch --tags --force

          TARGET_ARGS=()
          if ! git rev-parse "refs/tags/$TAG^{commit}" >/dev/null 2>&1; then
            echo "Tag $TAG not found on remote, will create tag on main"
            TARGET_ARGS=(--target main)
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Removing existing release $TAG (keeping tag)"
            gh release delete "$TAG" --yes --cleanup-tag=false
          fi

          gh release create "$TAG" "${FILES[@]}" \
            --draft \
            --title "WorkHub $TAG" \
            --generate-notes \
            "${TARGET_ARGS[@]}"
          # Draft 状态下 /releases/latest 不可用；确认 assets 含 latest.json 后请 Publish release
